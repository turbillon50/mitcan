<!doctype html>
<html class="dark" lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#faf4ec" />
  <meta name="color-scheme" content="light dark" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="CSN" />
  <meta name="description" content="24 sucursales de Carnes Selectas Nayarit en Tepic, Mazatlán, Vallarta, Bahía de Banderas y Nayarit." />
  <title>CSN — Sucursales</title>

  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon-180.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,800&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" />

  <script src="/assets/tailwind.config.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link rel="stylesheet" href="/assets/theme.css" />
  <script src="/assets/i18n.js"></script>
</head>
<body>
  <header class="app-header">
    <div class="app-header-inner">
      <a href="/" class="flex items-center justify-center w-10 h-10 hover:text-primary transition-colors" aria-label="Volver">
        <span class="material-symbols-outlined text-on-surface-variant">arrow_back</span>
      </a>
      <div class="flex items-center gap-2">
        <img src="/assets/logo-badge-sm.png" alt="" width="28" height="24" class="h-7 w-auto" decoding="async" />
        <h1 class="text-headline-md text-on-surface">Sucursales</h1>
      </div>
            <div style="display: inline-flex; gap: 8px;">
        <button class="toolbar-toggle" data-action="toggle-lang" data-i18n-attr="aria-label:a11y.lang">
          <span data-lang-toggle-label>EN</span>
        </button>
        <button class="icon-btn" data-action="toggle-theme" data-i18n-attr="aria-label:a11y.theme">
          <span class="material-symbols-outlined" style="font-size: 20px;" data-theme-toggle-icon>dark_mode</span>
        </button>
      </div>
    </div>
  </header>

  <main class="w-full max-w-md mx-auto px-margin-main flex flex-col gap-stack-lg">
    <section class="flex justify-between items-end">
      <div>
        <p class="text-on-surface-variant text-body-md mb-1">Cobertura</p>
        <h2 class="text-headline-xl text-on-surface">24 sucursales</h2>
      </div>
      <div class="bg-primary-container/20 px-3 py-1.5 rounded-full border border-primary-container/30">
        <p class="text-primary text-label-md">3 estados</p>
      </div>
    </section>

    <section class="relative">
      <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">search</span>
      <label for="suc-search" class="sr-only">Buscar sucursal</label>
      <input id="suc-search" type="search" autocomplete="off"
             class="w-full bg-surface-container border-none rounded-xl py-3 pl-12 pr-4 text-body-md focus:ring-1 focus:ring-primary placeholder:text-on-surface-variant/50"
             placeholder="Buscar por nombre, ciudad o colonia" />
    </section>

    <nav class="flex gap-stack-sm overflow-x-auto py-1 no-scrollbar" aria-label="Filtrar por área">
      <button data-filter="all" class="bg-primary-container text-on-primary-container px-stack-md py-stack-sm rounded-full text-label-md active-glow whitespace-nowrap">Todas</button>
      <button data-filter="tepic" class="bg-surface-variant text-on-surface-variant px-stack-md py-stack-sm rounded-full text-label-md hover:text-primary whitespace-nowrap">Tepic</button>
      <button data-filter="mazatlan" class="bg-surface-variant text-on-surface-variant px-stack-md py-stack-sm rounded-full text-label-md hover:text-primary whitespace-nowrap">Mazatlán</button>
      <button data-filter="vallarta" class="bg-surface-variant text-on-surface-variant px-stack-md py-stack-sm rounded-full text-label-md hover:text-primary whitespace-nowrap">Vallarta</button>
      <button data-filter="bahia" class="bg-surface-variant text-on-surface-variant px-stack-md py-stack-sm rounded-full text-label-md hover:text-primary whitespace-nowrap">Bahía de Banderas</button>
      <button data-filter="foraneas" class="bg-surface-variant text-on-surface-variant px-stack-md py-stack-sm rounded-full text-label-md hover:text-primary whitespace-nowrap">Foráneas Nayarit</button>
    </nav>

    <div id="suc-list" class="flex flex-col gap-stack-lg"></div>

    <p id="suc-empty" class="text-center text-on-surface-variant text-body-md py-stack-lg hidden">
      No encontramos sucursales con ese criterio.
    </p>
  </main>

  <nav class="bottom-nav" aria-label="Navegación principal">
    <a href="/"><span class="material-symbols-outlined">home</span><span data-i18n="nav.home">Inicio</span></a>
    <a href="/catalogo"><span class="material-symbols-outlined">grid_view</span><span data-i18n="nav.catalog">Catálogo</span></a>
    <a href="/pedido"><span class="material-symbols-outlined">shopping_bag</span><span data-i18n="nav.orders">Pedidos</span></a>
    <a href="/sucursales" aria-current="page"><span class="material-symbols-outlined">location_on</span><span data-i18n="nav.locations">Sucursales</span></a>
    <a href="/recompensas"><span class="material-symbols-outlined">redeem</span><span data-i18n="nav.rewards">Premios</span></a>
  </nav>

  <script src="/assets/sucursales.js" defer></script>
  <script src="/assets/app.js" defer></script>
</body>
</html>
