<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#faf4ec" />
  <meta name="color-scheme" content="light dark" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="CSN" />
  <title>CSN — Sin conexión</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon-180.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,800&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" />
  <link rel="stylesheet" href="/assets/theme.css" />
  <script src="/assets/i18n.js"></script>
</head>
<body>
  <main style="max-width: 28rem; margin: 0 auto; padding: 0 var(--margin-main); min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding-bottom: 0;">
    <img src="/assets/logo-badge-sm.png" alt="CSN — Carnes Selectas Nayarit" width="120" height="102" style="margin-bottom: 28px;" />
    <div style="width: 64px; height: 64px; border-radius: 18px; background: rgba(255, 140, 26, 0.14); color: var(--brand-orange); display: flex; align-items: center; justify-content: center; margin-bottom: 18px;">
      <span class="material-symbols-outlined" style="font-size: 32px;">cloud_off</span>
    </div>
    <h1 style="font-size: 30px; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 10px; color: var(--on-bg);" data-i18n="offline.title">Sin conexión</h1>
    <p style="color: var(--on-bg-muted); max-width: 300px; line-height: 1.45; margin: 0 0 26px; font-size: 15px;" data-i18n="offline.body">Parece que estás sin internet. Vuelve a intentarlo cuando recuperes conexión.</p>
    <button onclick="location.reload()" class="btn-primary" data-i18n="offline.retry">Reintentar</button>
    <a href="/" style="margin-top: 14px; color: var(--brand-orange); font-size: 13px; font-weight: 700;" data-i18n="offline.home">Volver al inicio</a>
  </main>
  <script src="/assets/app.js" defer></script>
</body>
</html>
