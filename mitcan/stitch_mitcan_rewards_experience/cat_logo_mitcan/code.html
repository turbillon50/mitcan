<script>
        // Micro-interaction for add buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function(e) {
                const rect = btn.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const ripple = document.createElement('span');
                ripple.style.position = 'absolute';
                ripple.style.width = '2px';
                ripple.style.height = '2px';
                ripple.style.background = 'rgba(255,255,255,0.4)';
                ripple.style.borderRadius = '50%';
                ripple.style.left = `${x}px`;
                ripple.style.top = `${y}px`;
                ripple.style.transform = 'scale(0)';
                ripple.style.transition = 'transform 0.5s ease-out, opacity 0.5s ease-out';
                
                btn.classList.add('relative', 'overflow-hidden');
                btn.appendChild(ripple);
                
                setTimeout(() => {
                    ripple.style.transform = 'scale(100)';
                    ripple.style.opacity = '0';
                }, 10);
                
                setTimeout(() => {
                    ripple.remove();
                }, 600);
            });
        });
